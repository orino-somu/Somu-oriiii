<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Titan+One&family=Poppins:wght@500;700&family=Caveat:wght@700&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
    #music-toggle {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 9999;
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: linear-gradient(135deg, #ff4d6d, #ff758f);
        border: none;
        color: white;
        font-size: 18px;
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(255,77,109,0.5);
        transition: transform 0.2s, box-shadow 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    #music-toggle:hover { transform: scale(1.1); }
    #music-toggle.muted { background: linear-gradient(135deg, #aaa, #ccc); box-shadow: none; }
    </style>
</head>
<body>
    <!-- Background Music: Put your music.mp3 in same folder as index.html -->
    <audio id="bday-audio" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div class="bg-bubbles">
        <div class="bubble love-note" data-msg="You are my sunshine! ☀️"><i class="fa-solid fa-heart"></i></div>
        <div class="bubble love-note" data-msg="Your smile is my favorite! 😍"><i class="fa-solid fa-star"></i></div>
        <div class="bubble love-note" data-msg="I love you to the moon & back! 🌙"><i class="fa-solid fa-heart"></i></div>
        <div class="bubble love-note" data-msg="You make my heart skip a beat! 💓"><i class="fa-solid fa-star"></i></div>
    </div>

    <div id="toast-note" class="toast">Message</div>

    <!-- Music Toggle Button -->
    <button id="music-toggle" title="Toggle Music">
        <i class="fa-solid fa-music" id="music-icon"></i>
    </button>

    <div id="wrapper">
        <div class="flag__birthday">
            <img src="./images/1.png" alt="" class="flag__left">
            <img src="./images/1.png" alt="" class="flag__right">
        </div>
        
        <div class="content">
            <div class="left">
                <div class="title">
                    <div class="happy text-row">
                        <span style="--t: 0.1s;">H</span><span style="--t: 0.2s;">a</span><span style="--t: 0.3s;">p</span><span style="--t: 0.4s;">p</span><span style="--t: 0.5s;">y</span>
                    </div>
                    <div class="birthday text-row">
                        <span style="--t: 0.6s;">B</span><span style="--t: 0.7s;">i</span><span style="--t: 0.8s;">r</span><span style="--t: 0.9s;">t</span><span style="--t: 1.0s;">h</span><span style="--t: 1.1s;">d</span><span style="--t: 1.2s;">a</span><span style="--t: 1.3s;">y</span>
                    </div>
                    <div class="hat"><img src="./images/hat.png" alt=""></div>
                </div>
                <div class="date__of__birth pop-in-date"><span></span></div>
                <div class="btn pop-in-btn">
                    <button id="btn__letter" class="shimmer-btn">
                        <span>Click here Oriiiiiiiiiiiiiiiiiiiiii</span>
                        <i class="fa-solid fa-envelope-open-heart"></i>
                    </button>
                </div>
                <div class="extra-actions pop-in-btn">
                    <button id="btn__cake" class="icon-btn" title="Blow the Candle"><i class="fa-solid fa-cake-candles"></i></button>
                    <button id="btn__scratch" class="icon-btn" title="Surprise Gift"><i class="fa-solid fa-gift"></i></button>
                </div>
            </div>

            <div class="right">
                <div class="box__account slide-up-bottom">
                    <div class="image float-anim">
                        <!-- Add Your Fav Person Image Here -->
                        <img src="./images/Snapchat-1272072920.jpg" alt="Birthday Person">
                    </div>
                    <div class="name">
                        <i class="fa-solid fa-heart beat"></i>
                        <span>ORIII</span>
                        <i class="fa-solid fa-heart beat"></i>
                    </div>
                    <div class="balloon_one swing-right"><img src="./images/balloon1.png" alt=""></div>
                    <div class="balloon_two swing-left"><img src="./images/balloon2.png" alt=""></div>
                </div>
                <div class="cricle scale-in">
                    <div class="text__cricle">
                        <span style="--i: 1;">h</span><span style="--i: 2;">a</span><span style="--i: 3;">p</span><span style="--i: 4;">p</span><span style="--i: 5;">y</span><span style="--i: 6;">-</span>
                        <span style="--i: 7;">b</span><span style="--i: 8;">i</span><span style="--i: 9;">r</span><span style="--i: 10;">t</span><span style="--i: 11;">h</span><span style="--i: 12;">d</span><span style="--i: 13;">a</span><span style="--i: 14;">y</span><span style="--i: 15;">-</span>
                    </div>
                    <i class="fa-solid fa-heart center-heart"></i>
                </div>
            </div>
        </div>

        <!-- Secret Letter Modal -->
        <div class="box__letter modal-box">
            <div class="letter__border">
                <div class="close"><i class="fa-solid fa-xmark"></i></div>
                <div class="letter">
                    <div class="title__letter"></div>
                    <div class="content__letter">
                        <div class="left">
                            <img id="heart__letter" src="https://media.giphy.com/media/YKUvclrGYmDKXwtphf/giphy.gif" alt="">
                            <img class="heart heart_1" style="--t: 0.2s" width="20" src="./images/heart.png" alt="">
                            <img class="heart heart_2" style="--t: 0.4s" width="20" src="./images/heart.png" alt="">
                            <img class="heart heart_3" style="--t: 0.6s" width="20" src="./images/heart.png" alt="">
                            <img class="heart heart_4" style="--t: 0.8s" width="20" src="./images/heart.png" alt="">
                        </div>
                        <div class="right">
                            <div class="love__img">
                                <img src="https://media.giphy.com/media/m85llaN7ZkFIHtURiC/giphy.gif" alt="" width="150">
                            </div>
                            <div class="text__letter"><p></p></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 3D Cake Modal -->
        <div id="cake-modal" class="modal-box">
            <div class="letter__border cake-card">
                <div class="close btn-close-cake"><i class="fa-solid fa-xmark"></i></div>
                <h2 class="title__letter cake-title">Make a Wish! 🎂</h2>
                <div class="cake-container">
                    <div class="cake-3d">
                        <div class="cake-side"></div>
                        <div class="cake-top">
                            <div class="frosting"></div>
                            <div class="candle" id="candle">
                                <div class="flame" id="flame"></div>
                            </div>
                        </div>
                    </div>
                </div>
                <p class="instruction">Tap the flame to blow it out!</p>
                <p class="wish-text hidden">May all your wishes come true! ✨</p>
            </div>
        </div>

        <!-- Scratch Card Modal -->
        <div id="scratch-modal" class="modal-box">
            <div class="letter__border scratch-card-box">
                <div class="close btn-close-scratch"><i class="fa-solid fa-xmark"></i></div>
                <h2 class="title__letter">Your Surprise 🎁</h2>
                <div class="scratch-container" id="scratch-container">
                    <div class="scratch-secret">
                        <h3>️My ORIII 💕</h3>
                        <p>I made this page only for you. LADLIII!</p>
                    </div>
                    <canvas id="scratch-canvas"></canvas>
                </div>
                <p class="instruction mt-3 scratch-instruction">Scratch the gold foil to reveal!</p>
            </div>
        </div>
    </div>

    <div id="copy">
        <p>Developed with ❤️ by <a href="#">@somu_mehta69</a></p>
    </div>

<script>
/* ============================================================
   🔊 SOUND ENGINE — Web Audio API (no sound files needed!)
   ============================================================ */
let audioCtx = null;
function getCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
}
function playTone(freq, type, dur, vol = 0.3, delay = 0) {
    const ctx = getCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime + delay);
    gain.gain.setValueAtTime(vol, ctx.currentTime + delay);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + dur);
    osc.start(ctx.currentTime + delay);
    osc.stop(ctx.currentTime + delay + dur);
}

// 🖱️ Soft click pop — all buttons
function sfxClick() {
    const ctx = getCtx();
    const osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(700, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(250, ctx.currentTime + 0.1);
    gain.gain.setValueAtTime(0.22, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
    osc.start(); osc.stop(ctx.currentTime + 0.14);
}

// 💌 Romantic chime — letter open
function sfxLetterOpen() {
    [523, 659, 784, 1047].forEach((f, i) => playTone(f, 'sine', 0.5, 0.18, i * 0.13));
}

// 🎂 Birthday fanfare — cake button
function sfxCake() {
    [[523,.15],[523,.15],[587,.3],[523,.3],[698,.3],[659,.6]].reduce((t, [f, d]) => {
        playTone(f, 'triangle', d, 0.22, t); return t + d + 0.03;
    }, 0);
}

// 🎁 Gift notes — scratch button
function sfxGift() {
    [400, 520, 660, 820].forEach((f, i) => playTone(f, 'square', 0.1, 0.14, i * 0.09));
}

// 💨 Whoosh — blow candle
function sfxWhoosh() {
    const ctx = getCtx();
    const buf = ctx.createBuffer(1, ctx.sampleRate * 0.4, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const flt = ctx.createBiquadFilter();
    flt.type = 'bandpass'; flt.frequency.setValueAtTime(900, ctx.currentTime);
    flt.frequency.exponentialRampToValueAtTime(180, ctx.currentTime + 0.4); flt.Q.value = 0.5;
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0.5, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
    src.connect(flt); flt.connect(gain); gain.connect(ctx.destination);
    src.start(); src.stop(ctx.currentTime + 0.45);
}

// ✨ Celebration sparkle — scratch reveal & wish
function sfxCelebrate() {
    [523,659,784,1047,1319,1047,784].forEach((f, i) => playTone(f, 'sine', 0.3, 0.18, i * 0.1));
    setTimeout(() => [2093,1760,2093].forEach((f,i) => playTone(f,'sine',0.15,0.1,i*0.12)), 400);
}

// 💬 Bubble pop — love notes
function sfxBubble() {
    const ctx = getCtx();
    const osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(1000, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(350, ctx.currentTime + 0.09);
    gain.gain.setValueAtTime(0.28, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
    osc.start(); osc.stop(ctx.currentTime + 0.12);
}

// ❌ Dismiss — close buttons
function sfxDismiss() {
    playTone(420, 'sine', 0.14, 0.14, 0);
    playTone(310, 'sine', 0.14, 0.1, 0.11);
}

// 🖊️ Typing tick — letter typing
function sfxTick() {
    playTone(1200 + Math.random()*200, 'sine', 0.03, 0.04, 0);
}

/* ============================================================
   🎵 BACKGROUND MUSIC
   ============================================================ */
let musicPlaying = false, musicStarted = false;

function startMusic() {
    if (musicStarted) return;
    musicStarted = true;
    const music = document.getElementById("bday-audio");
    music.volume = 0.4;
    music.play().then(() => { musicPlaying = true; updateMusicUI(); }).catch(() => {});
}
function updateMusicUI() {
    const icon = document.getElementById("music-icon");
    const btn = document.getElementById("music-toggle");
    icon.className = musicPlaying ? "fa-solid fa-music" : "fa-solid fa-music-slash";
    btn.title = musicPlaying ? "Pause Music" : "Play Music";
    musicPlaying ? btn.classList.remove("muted") : btn.classList.add("muted");
}
document.getElementById("music-toggle").addEventListener("click", function() {
    sfxClick();
    const music = document.getElementById("bday-audio");
    musicPlaying ? music.pause() : music.play();
    musicPlaying = !musicPlaying;
    if (!musicStarted) musicStarted = true;
    updateMusicUI();
});
function firstInteraction() {
    startMusic();
    document.removeEventListener('click', firstInteraction);
    document.removeEventListener('touchstart', firstInteraction);
}
document.addEventListener('click', firstInteraction);
document.addEventListener('touchstart', firstInteraction);

/* ============================================================
   MAIN SETUP
   ============================================================ */
let datetxt = "5th May";
let datatxtletter = "My Orii, You are a very special girl. I silently thank universe for bringing you into my life. I wish you endless joy, peace, and health. Let's celebrate many more together! Happy birthday! 💖✨";
let titleLetter = "For My Special One";
let charArrDate = datetxt.split(''), charArrDateLetter = datatxtletter.split(''), charArrTitle = titleLetter.split('');
let currentIndex = 0, currentIndexLetter = 0, currentIndexTitle = 0;
let date__of__birth = document.querySelector(".date__of__birth span");
let text__letter = document.querySelector(".text__letter p");
let intervalContent, intervalTitle;

setTimeout(function(){
    let t = setInterval(function(){
        if(currentIndex < charArrDate.length){ date__of__birth.textContent += charArrDate[currentIndex++]; }
        else clearInterval(t);
    }, 100);
}, 3800);

/* ============================================================
   💌 LETTER BUTTON
   ============================================================ */
$("#btn__letter").on("click", function(){
    sfxClick(); sfxLetterOpen();
    fireConfetti();
    $(".box__letter").css("display","flex").hide().fadeIn(400);
    setTimeout(() => $(".box__letter .letter__border").addClass("active"), 100);
    setTimeout(function(){
        intervalTitle = setInterval(function(){
            if(currentIndexTitle < charArrTitle.length){
                document.querySelector(".title__letter").textContent += charArrTitle[currentIndexTitle++];
            } else {
                let icon = document.createElement("i");
                icon.className = "fa-solid fa-heart fa-beat";
                icon.style.color = "#ff4d6d"; icon.style.marginLeft = "8px";
                document.querySelector(".title__letter").appendChild(icon);
                clearInterval(intervalTitle);
            }
        }, 100);
    }, 800);
    setTimeout(function(){
        document.querySelector("#heart__letter").classList.add("animationOp");
        document.querySelector(".love__img").classList.add("animationOp");
        document.querySelectorAll(".heart").forEach(item => item.classList.add("animation"));
    }, 1200);
    setTimeout(function(){
        let tickCount = 0;
        intervalContent = setInterval(function(){
            if(currentIndexLetter < charArrDateLetter.length){
                text__letter.textContent += charArrDateLetter[currentIndexLetter++];
                tickCount++;
                if (tickCount % 4 === 0) sfxTick(); // 🎵 Typing tick sound
            } else {
                clearInterval(intervalContent);
                sfxCelebrate(); // 🎵 Celebration when letter is fully typed
            }
        }, 50);
    }, 2200);
});

$(".box__letter .close").on("click", function(){
    sfxDismiss();
    clearInterval(intervalContent);
    document.querySelector(".title__letter").textContent = "";
    text__letter.textContent = "";
    currentIndexLetter = 0; currentIndexTitle = 0;
    document.querySelector("#heart__letter").classList.remove("animationOp");
    document.querySelector(".love__img").classList.remove("animationOp");
    document.querySelectorAll(".heart").forEach(item => item.classList.remove("animation"));
    $(".box__letter .letter__border").removeClass("active");
    setTimeout(() => $(".box__letter").fadeOut(400), 400);
});

/* ============================================================
   🎂 CAKE BUTTON
   ============================================================ */
$("#btn__cake").on("click", function() {
    sfxClick(); sfxCake(); // 🎵 Birthday fanfare
    $("#cake-modal").css("display","flex").hide().fadeIn(400);
    setTimeout(() => $("#cake-modal .letter__border").addClass("active"), 100);
    $("#flame").css("display","block");
    $(".wish-text").addClass("hidden");
});

$("#flame").on("click touchstart", function(e) {
    e.preventDefault();
    sfxWhoosh(); // 🎵 Candle blow whoosh
    $(this).fadeOut(300);
    $("#cake-modal").css("background","#000000");
    $("#cake-modal .letter__border").css({"background":"#0a0a0a","box-shadow":"none","border-color":"#111"});
    $(".cake-3d").css("filter","brightness(0.1)");
    $(".instruction, .cake-title").css("opacity","0");
    setTimeout(() => {
        sfxCelebrate(); // 🎵 Celebration after darkness
        $("#cake-modal").css("background","radial-gradient(circle, #240046 0%, #000 100%)");
        $("#cake-modal .letter__border").addClass("party-mode");
        $(".cake-3d").css("filter","brightness(1.1) drop-shadow(0 0 15px rgba(255,0,110,0.5))");
        $(".wish-text").removeClass("hidden").hide().fadeIn();
        fireConfetti();
    }, 1500);
});

$(".btn-close-cake").on("click", function(){
    sfxDismiss();
    $("#cake-modal .letter__border").removeClass("active party-mode");
    setTimeout(() => {
        $("#cake-modal").fadeOut(400);
        setTimeout(() => {
            $("#cake-modal").css("background","");
            $("#cake-modal .letter__border").css({"background":"","box-shadow":"","border-color":""});
            $(".cake-3d").css("filter","");
            $(".instruction, .cake-title").css("opacity","1");
        }, 400);
    }, 100);
});

/* ============================================================
   🎁 SCRATCH CARD
   ============================================================ */
$("#btn__scratch").on("click", function() {
    sfxClick(); sfxGift(); // 🎵 Gift sound
    $("#scratch-modal").css("display","flex").hide().fadeIn(400);
    setTimeout(() => $("#scratch-modal .letter__border").addClass("active"), 100);
    $(".scratch-secret").removeClass("pop-gift");
    $("#scratch-canvas").show().css("opacity","1");
    $(".scratch-instruction").text("Scratch the gold foil to reveal your gift!");
    initScratchCard();
});

$(".btn-close-scratch").on("click", function(){
    sfxDismiss();
    $("#scratch-modal .letter__border").removeClass("active");
    setTimeout(() => $("#scratch-modal").fadeOut(400), 400);
});

function initScratchCard() {
    const canvas = document.getElementById("scratch-canvas");
    const ctx = canvas.getContext("2d");
    const container = document.getElementById("scratch-container");
    canvas.width = container.offsetWidth;
    canvas.height = container.offsetHeight;
    let gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
    gradient.addColorStop(0,"#D4AF37"); gradient.addColorStop(0.5,"#FFDF73"); gradient.addColorStop(1,"#AA7700");
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "rgba(255,255,255,0.6)"; ctx.font = "bold 22px Poppins"; ctx.textAlign = "center";
    ctx.fillText("✨ SCRATCH ME ✨", canvas.width/2, canvas.height/2 + 8);
    let isDrawing = false, isRevealed = false, lastSfx = 0;
    function getBrushPos(e) {
        let rect = canvas.getBoundingClientRect();
        return { x:(e.clientX||e.touches[0].clientX)-rect.left, y:(e.clientY||e.touches[0].clientY)-rect.top };
    }
    function scratch(e) {
        if(!isDrawing || isRevealed) return;
        e.preventDefault();
        let pos = getBrushPos(e);
        ctx.globalCompositeOperation = "destination-out";
        ctx.beginPath(); ctx.arc(pos.x, pos.y, 25, 0, 2*Math.PI); ctx.fill();
        // 🎵 Subtle scratch sound (throttled)
        let now = Date.now();
        if (now - lastSfx > 110) { lastSfx = now; playTone(180+Math.random()*80,'sawtooth',0.06,0.04,0); }
    }
    function checkReveal() {
        if(isRevealed) return;
        const img = ctx.getImageData(0,0,canvas.width,canvas.height);
        let tp = 0;
        for(let i=3;i<img.data.length;i+=4) if(img.data[i]===0) tp++;
        if((tp/(canvas.width*canvas.height))*100 > 45){
            isRevealed = true;
            $(canvas).animate({opacity:0},500,function(){$(this).hide();});
            setTimeout(() => {
                $(".scratch-secret").addClass("pop-gift");
                $(".scratch-instruction").text("Yay! You found it! 🎉");
                sfxCelebrate(); // 🎵 Big celebration!
                confetti({particleCount:100,spread:60,origin:{y:0.7},zIndex:1500});
            }, 200);
        }
    }
    canvas.addEventListener("mousedown",()=>isDrawing=true);
    canvas.addEventListener("touchstart",()=>isDrawing=true);
    canvas.addEventListener("mouseup",()=>{isDrawing=false;checkReveal();});
    canvas.addEventListener("touchend",()=>{isDrawing=false;checkReveal();});
    canvas.addEventListener("mousemove",scratch);
    canvas.addEventListener("touchmove",scratch);
}

/* ============================================================
   💬 FLOATING LOVE NOTES
   ============================================================ */
$(".love-note").on("click touchstart", function(e) {
    e.preventDefault();
    sfxBubble(); // 🎵 Bubble pop
    let msg = $(this).attr("data-msg");
    $("#toast-note").text(msg).fadeIn(300);
    setTimeout(() => $("#toast-note").fadeOut(500), 3000);
});

function fireConfetti() {
    confetti({particleCount:200,spread:90,origin:{y:0.6},colors:['#ff4d6d','#ff758f','#fff','#ffd60a'],disableForReducedMotion:true,zIndex:2000});
}
</script>
</body>
